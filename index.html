<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬靈魂煉金工坊 V1.7.7</title>
    <style>
        :root { 
            --main-color: #4a7c59; 
            --bg-color: #f4f7f5; 
            --card-bg: rgba(255, 255, 255, 0.85); 
            --text-color: #333333;
            --input-bg: rgba(255, 255, 255, 0.7); 
            --border-color: #ddd;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; transition: background 0.3s; background-size: cover; background-position: center; background-attachment: fixed; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 340px; border: 2px solid var(--main-color); color: #333; }
        .login-box h2 { color: var(--main-color); margin-bottom: 25px; font-weight: 900; }
        .login-box input { width: 90%; padding: 12px; margin-bottom: 18px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-login { background: var(--main-color); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .container { background: var(--card-bg); width: 95%; max-width: 950px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; position: relative; backdrop-filter: blur(2px); }
        .main-title { color: var(--main-color); text-align: center; border: none; width: 100%; font-size: 1.8em; font-weight: bold; margin-bottom: 10px; outline: none; background: transparent; }
        .version-control { text-align: right; color: var(--text-color); opacity: 0.7; font-size: 0.9em; margin-bottom: 10px; }
        #version-number { width: 80px; padding: 3px; border: 1px solid var(--border-color); border-radius: 3px; background: var(--input-bg); color: var(--text-color); }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; justify-content: center; flex-wrap: wrap; }
        
        #bg-config-btn { position: absolute; top: 20px; right: 20px; background: var(--main-color); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; }
        
        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 8px 15px; transition: 0.2s; font-weight: bold; }
        .btn-move-cat { background: #e74c3c; color: white; padding: 2px 8px; font-size: 12px; }
        .btn-move-sub { background: #8e44ad; color: white; padding: 2px 8px; font-size: 12px; }
        .btn-move-rule { background: #27ae60; color: white; padding: 2px 8px; font-size: 14px; }
        .btn-copy-raw { background: #8e44ad; color: white; }
        .btn-download { background: #6c5ce7; color: white; }
        .btn-import-direct { background: #2980b9; color: white; }
        .btn-add { background: var(--main-color); color: white; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 10px; }
        
        .category-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 10px; margin-bottom: 20px; background: var(--card-bg); position: relative; border-left: 8px solid var(--main-color); }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .category-title { font-size: 1.25em; font-weight: bold; color: var(--main-color); width: 45%; border: none; outline: none; background: var(--input-bg); color: var(--text-color); padding: 5px; border-radius: 4px; }
        
        .mixed-list { display: flex; flex-direction: column; gap: 10px; }
        .subtitle-item { display: flex; align-items: center; gap: 8px; background: rgba(243, 156, 18, 0.15); padding: 8px 12px; border-radius: 5px; border-left: 5px solid #f39c12; }
        .subtitle-input { flex: 1; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; font-weight: bold; background: var(--input-bg); color: var(--text-color); }
        
        .rule-item { display: flex; gap: 8px; align-items: flex-start; background: rgba(0,0,0,0.02); padding: 5px; border-radius: 5px; border: 1px solid var(--border-color); }
        .rule-key { width: 25%; padding: 8px; border: 1px solid var(--border-color); border-radius: 5px; font-weight: bold; background: var(--input-bg); color: var(--text-color); }
        .rule-value { width: 55%; padding: 8px; border: 1px solid var(--border-color); border-radius: 5px; min-height: 40px; background: var(--input-bg); color: var(--text-color); }
        
        .export-area { margin-top: 30px; padding: 15px; background: #222; color: #0f0; border-radius: 5px; display: none; white-space: pre-wrap; font-family: monospace; }
        #hidden-file-input, #hidden-bg-input { display: none; }
        .bottom-actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn-copy-scroll { flex: 1; background: #27ae60; color: white; font-size: 1.1em; padding: 15px; }
        .btn-export { flex: 2; background: #2c3e50; color: white; font-size: 1.1em; padding: 15px; }

        #bg-config-panel { display: none; position: fixed; top: 70px; right: 20px; background: white; border: 2px solid var(--main-color); border-radius: 10px; padding: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100; color: #333; width: 220px; text-align: center; }
        #bg-config-panel h4 { margin: 0 0 10px 0; color: var(--main-color); }
        .btn-bg-opt { width: 100%; margin-bottom: 8px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 安全驗證</h2>
        <input type="text" id="user" placeholder="管理員帳號" autocomplete="off">
        <input type="password" id="pass" placeholder="存取密碼" autocomplete="off">
        <button class="btn-login" id="start-btn">解鎖進入</button>
    </div>
</div>

<div class="container" id="main-app">
    <button id="bg-config-btn" title="自訂靈魂圖騰 (背景圖片)">🖼️</button>
    
    <div id="bg-config-panel">
        <h4>🖼️ 自訂環境圖騰</h4>
        <button class="btn btn-import-direct btn-bg-opt" id="upload-bg-trigger">📤 上傳背景圖片</button>
        <button class="btn btn-del btn-bg-opt" style="font-size:12px;" id="reset-bg-btn">🍃 還原鈴蘭綠</button>
        <p style="font-size: 11px; color: #666; margin-top: 5px;">建議使用高解析度圖片<br>工坊會自動記憶您的選擇</p>
    </div>

    <input type="file" id="hidden-bg-input" accept="image/*">

    <input type="text" id="main-title" class="main-title" value="【虛擬靈魂煉金工坊：V1.7.7】">
    <div class="version-control">版本：V1.<input type="number" id="version-number" value="0078"></div>
    
    <div class="toolbar">
        <button class="btn btn-copy-raw" onclick="copyJSON()">📋 複製代碼</button>
        <button class="btn btn-download" onclick="exportToJSON()">💾 下載存檔</button>
        <button class="btn btn-import-direct" onclick="triggerFileSelect()">📥 匯入 JSON 檔案</button>
        <input type="file" id="hidden-file-input" accept=".json">
    </div>

    <div id="settings-container"></div>
    <button class="btn btn-add" style="width:100%;" onclick="newCategory()">✨ 新增第一人稱敘事大方向</button>
    
    <div class="bottom-actions">
        <button class="btn btn-copy-scroll" onclick="copyFinalScroll()">📜 複製靈魂卷軸</button>
        <button class="btn btn-export" onclick="showScroll()">🔮 生成靈魂卷軸</button>
    </div>
    <div id="export-display" class="export-area"></div>
</div>

<script>
    const _0x4a2e = ["Z2hoam1hcnk=", "d0VKVEhKNDlGMDUwOA=="]; 

    // 初始化事件監聽
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('start-btn').addEventListener('click', startApp);
        document.getElementById('bg-config-btn').addEventListener('click', toggleBgPanel);
        document.getElementById('upload-bg-trigger').addEventListener('click', () => document.getElementById('hidden-bg-input').click());
        document.getElementById('reset-bg-btn').addEventListener('click', resetBg);
        document.getElementById('hidden-bg-input').addEventListener('change', (e) => readBgFile(e.target));
        document.getElementById('hidden-file-input').addEventListener('change', (e) => readLocalFile(e.target));
        
        // 鍵盤 Enter 登入
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') startApp(); });
        
        // 預載背景
        loadSavedBg();
    });

    function startApp() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if (btoa(u) === _0x4a2e[0] && btoa(p) === _0x4a2e[1]) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { alert("驗證錯誤！"); }
    }

    function toggleBgPanel() {
        const panel = document.getElementById('bg-config-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function readBgFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = e.target.result;
            applyBg(data);
            try { localStorage.setItem('alchemy_工坊圖騰', data); } catch(e) { alert("圖片太大，無法自動記憶。"); }
            toggleBgPanel();
        };
        reader.readAsDataURL(file);
    }

    function applyBg(imgData) {
        document.body.style.backgroundImage = `url(${imgData})`;
        document.body.style.backgroundColor = "transparent";
    }

    function resetBg() {
        document.body.style.backgroundImage = "none";
        document.body.style.backgroundColor = "var(--bg-color)";
        localStorage.removeItem('alchemy_工坊圖騰');
        toggleBgPanel();
    }

    function loadSavedBg() {
        const savedBg = localStorage.getItem('alchemy_工坊圖騰');
        if (savedBg) { applyBg(savedBg); }
    }

    function triggerFileSelect() { document.getElementById('hidden-file-input').click(); }

    function readLocalFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const json = JSON.parse(e.target.result);
                applyDataToUI(json);
                alert("✅ 靈魂備份載入成功！");
            } catch (err) { alert("❌ 讀取失敗。"); }
        };
        reader.readAsText(file);
    }

    function applyDataToUI(data) {
        document.getElementById('main-title').value = data.title || "";
        document.getElementById('version-number').value = data.version || "0001";
        const box = document.getElementById('settings-container');
        box.innerHTML = "";
        if (data.categories) {
            data.categories.forEach(c => {
                const card = newCategory(c.name);
                if (c.subtitles) c.subtitles.forEach(s => addSub(card.querySelector('.btn-sub-trigger'), s));
                if (c.rules) c.rules.forEach(r => newRule(card.querySelector('.btn-rule-trigger'), r.k, r.v));
            });
        }
    }

    function newCategory(t = "") {
        const box = document.getElementById('settings-container');
        const div = document.createElement('div');
        div.className = 'category-card';
        div.innerHTML = `
            <div class="category-header">
                <div>
                    <button class="btn btn-move-cat" onclick="moveElement(this, -1)">↑ 移上</button>
                    <button class="btn btn-move-cat" onclick="moveElement(this, 1)">↓ 移下</button>
                    <input type="text" class="category-title" placeholder="大方向名稱" value="${t}">
                </div>
                <div>
                    <button class="btn btn-sub-trigger" style="background:#f39c12; color:white; font-size:12px; padding:5px 10px;" onclick="addSub(this)">🏷️ 新增副標題</button>
                    <button class="btn btn-del" onclick="confirmDeleteCat(this)">X</button>
                </div>
            </div>
            <div class="mixed-list"></div>
            <button class="btn btn-add btn-rule-trigger" style="margin-top:10px;" onclick="newRule(this)">+ 新增細項</button>
        `;
        box.appendChild(div);
        return div;
    }

    function confirmDeleteCat(btn) {
        if (confirm("飛羽千芒說：這會丟失大量靈魂片段 你確定要這樣做嗎?")) {
            btn.closest('.category-card').remove();
        }
    }

    function moveElement(btn, direction) {
        const item = btn.closest('.category-card, .subtitle-item, .rule-item');
        if (direction === -1 && item.previousElementSibling) {
            item.parentNode.insertBefore(item, item.previousElementSibling);
        } else if (direction === 1 && item.nextElementSibling) {
            item.parentNode.insertBefore(item.nextElementSibling, item);
        }
    }

    function addSub(btn, val = "") {
        const list = btn.closest('.category-card').querySelector('.mixed-list');
        const item = document.createElement('div');
        item.className = 'subtitle-item';
        item.innerHTML = `
            <button class="btn btn-move-sub" onclick="moveElement(this, -1)">↑</button>
            <button class="btn btn-move-sub" onclick="moveElement(this, 1)">↓</button>
            <input type="text" class="subtitle-input" placeholder="副標題名稱" value="${val}">
            <button class="btn btn-del" style="padding: 2px 8px;" onclick="this.parentElement.remove()">×</button>
        `;
        list.appendChild(item);
    }

    function newRule(btn, k="", v="") {
        const list = btn.closest('.category-card').querySelector('.mixed-list');
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <button class="btn btn-move-rule" onclick="moveElement(this, -1)">↑</button>
            <button class="btn btn-move-rule" onclick="moveElement(this, 1)">↓</button>
            <input type="text" class="rule-key" placeholder="項次" value="${k}">
            <textarea class="rule-value" placeholder="內容">${v}</textarea>
            <button class="btn btn-del" onclick="this.parentElement.remove()">X</button>`;
        list.appendChild(item);
    }

    function packData() {
        return {
            title: document.getElementById('main-title').value,
            version: document.getElementById('version-number').value,
            categories: Array.from(document.querySelectorAll('.category-card')).map(card => {
                const mixedElements = Array.from(card.querySelectorAll('.subtitle-item, .rule-item'));
                const subtitles = [];
                const rules = [];
                mixedElements.forEach(el => {
                    if (el.classList.contains('subtitle-item')) {
                        subtitles.push(el.querySelector('.subtitle-input').value);
                    } else {
                        rules.push({ k: el.querySelector('.rule-key').value, v: el.querySelector('.rule-value').value });
                    }
                });
                return { name: card.querySelector('.category-title').value, subtitles: subtitles, rules: rules };
            })
        };
    }

    function makeScroll() {
        let v = document.getElementById('version-number').value;
        let t = `# ${document.getElementById('main-title').value}\n\n**【核心邏輯】：本對話採用第一人稱敘事。**\n\n`;
        document.querySelectorAll('.category-card').forEach((card, i) => {
            t += `## ${i}. ${card.querySelector('.category-title').value}\n`;
            card.querySelectorAll('.subtitle-item, .rule-item').forEach(el => {
                if (el.classList.contains('subtitle-item')) {
                    const subVal = el.querySelector('.subtitle-input').value;
                    if(subVal) t += `### ${subVal}\n`;
                } else {
                    const k = el.querySelector('.rule-key').value;
                    const v = el.querySelector('.rule-value').value;
                    if(k) t += `- **【${k}】：** ${v}\n`;
                }
            });
            t += "\n";
        });
        t += `---\n**版本：V1.${v.padStart(4, '0')}**`;
        return t;
    }

    function exportToJSON() {
        const d = packData();
        const blob = new Blob([JSON.stringify(d, null, 2)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `煉金存檔_${d.version}.json`; a.click();
    }
    
    function copyJSON() { navigator.clipboard.writeText(JSON.stringify(packData())).then(() => alert("代碼複製成功！")); }

    function showScroll() {
        const txt = makeScroll();
        const d = document.getElementById('export-display');
        d.innerText = txt; d.style.display = 'block';
        document.getElementById('version-number').value = (parseInt(document.getElementById('version-number').value) + 1).toString().padStart(4, '0');
        window.scrollTo(0, document.body.scrollHeight);
    }
    
    function copyFinalScroll() { navigator.clipboard.writeText(makeScroll()).then(() => alert("卷軸已複製！")); }
</script>

</body>
</html>

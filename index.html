<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬靈魂煉金工坊 V1.9.2</title>
    <style>
        :root { 
            --main-color: #4a7c59; 
            --bg-color: #f4f7f5; 
            --interface-opacity: 0.85; 
            --scroll-opacity: 0.9;    
            --text-color: #333333;
            --input-bg-base: 255, 255, 255; 
            --border-color: rgba(0,0,0,0.1);
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover; 
            background-position: center center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: var(--text-color); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: flex-start; 
        }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 340px; border: 2px solid var(--main-color); }
        
        .container { 
            background: rgba(255, 255, 255, var(--interface-opacity)); 
            width: 95%; max-width: 950px; padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: none; 
            position: relative; 
            backdrop-filter: blur(3px); 
            transition: background 0.2s;
        }
        
        .main-title { color: var(--main-color); text-align: center; border: none; width: 100%; font-size: 1.8em; font-weight: bold; margin-bottom: 10px; outline: none; background: transparent; }
        .version-control { text-align: right; color: var(--text-color); opacity: 0.7; font-size: 0.9em; margin-bottom: 10px; }
        #version-number { width: 80px; padding: 3px; border: 1px solid #ddd; border-radius: 3px; background: rgba(255,255,255, 0.5); }

        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; justify-content: center; flex-wrap: wrap; }
        
        .btn-emoji-move { background: none; border: none; cursor: pointer; transition: transform 0.1s; vertical-align: middle; line-height: 1; }
        .btn-emoji-move:hover { transform: scale(1.3); }
        .cat-move { font-size: 28px; }
        .sub-move { font-size: 22px; }
        .rule-move { font-size: 18px; }

        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 8px 15px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--main-color); color: white; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 10px; }
        
        .category-card { 
            border: 1px solid var(--border-color); 
            padding: 20px; border-radius: 10px; margin-bottom: 20px; 
            background: rgba(255, 255, 255, calc(var(--interface-opacity) * 0.5));
            position: relative; border-left: 8px solid var(--main-color); 
        }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; gap: 10px; }
        
        .category-title, .subtitle-input, .rule-key, .rule-value {
            background: rgba(255, 255, 255, calc(var(--interface-opacity) - 0.2)) !important;
            border: 1px solid rgba(0,0,0,0.1) !important;
            transition: background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        /* 極限寬度優化：上調至 85% */
        .category-title { font-size: 1.25em; font-weight: bold; color: var(--main-color); width: 85%; padding: 8px; border-radius: 4px; }
        
        .mixed-list { display: flex; flex-direction: column; gap: 10px; }
        .subtitle-item { display: flex; align-items: center; gap: 8px; background: rgba(243, 156, 18, 0.15); padding: 8px 12px; border-radius: 5px; border-left: 5px solid #f39c12; }
        .subtitle-input { flex: 1; padding: 6px; border-radius: 4px; font-weight: bold; }
        
        .rule-item { display: flex; gap: 8px; align-items: flex-start; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 5px; border: 1px solid var(--border-color); }
        .rule-key { width: 22%; padding: 8px; border-radius: 5px; font-weight: bold; }
        .rule-value { width: 55%; padding: 8px; border-radius: 5px; min-height: 40px; font-size: 14px; resize: vertical; }
        
        .export-area { 
            margin-top: 30px; padding: 15px; 
            background: rgba(34, 34, 34, var(--scroll-opacity)); 
            color: #0f0; border-radius: 5px; 
            display: none; white-space: pre-wrap; font-family: monospace; 
            transition: background 0.2s;
        }

        .bottom-actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn-copy-scroll { flex: 1; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-export { flex: 2; background: #2c3e50; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #bg-config-btn { position: absolute; top: 20px; right: 20px; background: var(--main-color); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; z-index: 10; }

        .config-panel { display: none; position: fixed; top: 70px; right: 20px; background: white; border: 2px solid var(--main-color); border-radius: 10px; padding: 15px; z-index: 100; width: 220px; text-align: center; color: #333; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .config-panel h4 { margin: 0 0 10px 0; color: var(--main-color); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .slider-group { margin-top: 10px; padding: 8px; background: #f9f9f9; border-radius: 5px; border: 1px solid #eee; text-align: left; }
        .slider-group label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; }
        .config-slider { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 安全驗證</h2>
        <input type="text" id="user" placeholder="帳號" autocomplete="off">
        <input type="password" id="pass" placeholder="密碼" autocomplete="off">
        <button class="btn-login" id="start-btn">解鎖進入</button>
    </div>
</div>

<div class="container" id="main-app">
    <button id="bg-config-btn" title="背景與介面配置">🖼️</button>
    
    <div class="config-panel" id="bg-config-panel">
        <h4>🖼️ 背景與透視</h4>
        <button class="btn btn-add" style="width:100%; margin-bottom:10px; background:#2980b9;" id="upload-bg-trigger">📤 上傳背景圖</button>
        
        <div class="slider-group" id="focus-area" style="display:none;">
            <label>👤 垂直對焦 (調整角色高度)</label>
            <input type="range" min="0" max="100" value="50" class="config-slider" id="focus-slider">
        </div>

        <div class="slider-group">
            <label>👻 全域透視度 (含輸入框)</label>
            <input type="range" min="5" max="100" value="85" class="config-slider" id="interface-opacity-slider">
        </div>

        <button class="btn btn-del" style="width:100%; margin-top:10px; font-size:12px;" id="reset-bg-btn">🍃 還原背景</button>
    </div>
    <input type="file" id="hidden-bg-input" style="display:none;" accept="image/*">

    <input type="text" id="main-title" class="main-title" value="【虛擬靈魂煉金工坊：V1.9.2】">
    <div class="version-control">版本：V1.<input type="number" id="version-number" value="0092"></div>
    
    <div class="toolbar">
        <button class="btn" style="background:#8e44ad; color:white;" onclick="copyJSON()">📋 複製 JSON</button>
        <button class="btn" style="background:#6c5ce7; color:white;" onclick="exportToJSON()">💾 下載存檔</button>
        <button class="btn" style="background:#2980b9; color:white;" onclick="triggerFileSelect()">📥 匯入 JSON</button>
        <input type="file" id="hidden-file-input" style="display:none;" accept=".json">
    </div>

    <div id="settings-container"></div>
    <button class="btn btn-add" style="width:100%; margin-top:10px;" onclick="newCategory()">✨ 新增敘事大方向</button>
    
    <div class="bottom-actions">
        <button class="btn-copy-scroll" onclick="copyFinalScroll()">📜 複製靈魂卷軸</button>
        <button class="btn-export" onclick="showScroll()">🔮 生成靈魂卷軸</button>
    </div>
    <div id="export-display" class="export-area"></div>
</div>

<script>
    const _0x4a2e = ["Z2hoam1hcnk=", "d0VKVEhKNDlGMDUwOA=="]; 

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('start-btn').addEventListener('click', startApp);
        document.getElementById('bg-config-btn').addEventListener('click', () => {
            const p = document.getElementById('bg-config-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        });

        document.getElementById('upload-bg-trigger').addEventListener('click', () => document.getElementById('hidden-bg-input').click());
        document.getElementById('hidden-bg-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { applyBg(ev.target.result); localStorage.setItem('alchemy_bg', ev.target.result); };
            reader.readAsDataURL(file);
        });

        document.getElementById('focus-slider').addEventListener('input', (e) => applyFocus(e.target.value));
        document.getElementById('interface-opacity-slider').addEventListener('input', (e) => applyOpacity(e.target.value));

        document.getElementById('reset-bg-btn').addEventListener('click', () => {
            document.body.style.backgroundImage = 'none';
            localStorage.removeItem('alchemy_bg');
            document.getElementById('focus-area').style.display = 'none';
        });
        
        document.getElementById('hidden-file-input').addEventListener('change', (e) => readLocalFile(e.target));
        loadSavedSettings();
    });

    function startApp() {
        if (btoa(document.getElementById('user').value) === _0x4a2e[0] && btoa(document.getElementById('pass').value) === _0x4a2e[1]) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { alert("驗證錯誤！"); }
    }

    function applyBg(imgData) { document.body.style.backgroundImage = `url(${imgData})`; document.getElementById('focus-area').style.display = 'block'; }
    function applyFocus(val) { document.body.style.backgroundPositionY = val + '%'; localStorage.setItem('alchemy_focus', val); }
    
    function applyOpacity(val) {
        const interfaceVer = val / 100;
        document.documentElement.style.setProperty('--interface-opacity', interfaceVer);
        document.documentElement.style.setProperty('--scroll-opacity', Math.max(0.1, interfaceVer));
        localStorage.setItem('alchemy_interface_opacity', val);
    }

    function loadSavedSettings() {
        const savedBg = localStorage.getItem('alchemy_bg');
        if(savedBg) {
            applyBg(savedBg);
            const savedFocus = localStorage.getItem('alchemy_focus') || 50;
            document.getElementById('focus-slider').value = savedFocus;
            applyFocus(savedFocus);
        }
        const savedOpacity = localStorage.getItem('alchemy_interface_opacity') || 85;
        document.getElementById('interface-opacity-slider').value = savedOpacity;
        applyOpacity(savedOpacity);
    }

    function triggerFileSelect() { document.getElementById('hidden-file-input').click(); }
    function readLocalFile(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try { applyDataToUI(JSON.parse(e.target.result)); alert("✅ 載入成功！"); } catch (err) { alert("❌ 失敗。"); }
        };
        reader.readAsText(file);
    }

    function applyDataToUI(data) {
        document.getElementById('main-title').value = data.title || "";
        document.getElementById('version-number').value = data.version || "0092";
        const box = document.getElementById('settings-container'); box.innerHTML = "";
        if (data.categories) {
            data.categories.forEach(c => {
                const card = newCategory(c.name);
                if (c.rules) c.rules.forEach(r => newRule(card.querySelector('.btn-add'), r.k, r.v));
                if (c.subtitles) c.subtitles.forEach(s => addSub(card.querySelector('.btn-add'), s));
            });
        }
    }

    function moveElement(btn, dir) {
        const item = btn.closest('.category-card, .subtitle-item, .rule-item');
        if (dir === -1 && item.previousElementSibling) item.parentNode.insertBefore(item, item.previousElementSibling);
        else if (dir === 1 && item.nextElementSibling) item.parentNode.insertBefore(item.nextElementSibling, item);
    }

    function newCategory(t = "") {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.innerHTML = `
            <div class="category-header">
                <div style="flex:1; display:flex; align-items:center; gap:5px;">
                    <button class="btn-emoji-move cat-move" onclick="moveElement(this, -1)">🔺</button>
                    <button class="btn-emoji-move cat-move" onclick="moveElement(this, 1)">🔻</button>
                    <input type="text" class="category-title" placeholder="大方向名稱" value="${t}">
                </div>
                <div style="display:flex; gap:5px; align-items:center;">
                    <button class="btn-add" style="background:#f39c12; font-size:12px; white-space:nowrap;" onclick="addSub(this)">🏷️ 副標題</button>
                    <button class="btn-del" onclick="safeDeleteCategory(this)">X</button>
                </div>
            </div>
            <div class="mixed-list"></div>
            <button class="btn btn-add" style="width:100%; margin-top:10px;" onclick="newRule(this)">+ 新增細項</button>
        `;
        document.getElementById('settings-container').appendChild(div);
        return div;
    }

    function safeDeleteCategory(btn) {
        if (confirm("⚠️ ⚠️ ⚠️ 會丟失大量靈魂片段⚠️ ⚠️ ⚠️")) {
            btn.closest('.category-card').remove();
        }
    }

    function addSub(btn, val = "") {
        const item = document.createElement('div');
        item.className = 'subtitle-item';
        item.innerHTML = `
            <button class="btn-emoji-move sub-move" onclick="moveElement(this, -1)">⬆️</button>
            <button class="btn-emoji-move sub-move" onclick="moveElement(this, 1)">⬇️</button>
            <input type="text" class="subtitle-input" placeholder="副標題名稱" value="${val}">
            <button class="btn-del" style="padding:2px 8px;" onclick="this.parentElement.remove()">×</button>
        `;
        btn.closest('.category-card').querySelector('.mixed-list').prepend(item);
    }

    function newRule(btn, k = "", v = "") {
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <div style="display:flex; flex-direction:column;">
                <button class="btn-emoji-move rule-move" onclick="moveElement(this, -1)">🔼</button>
                <button class="btn-emoji-move rule-move" onclick="moveElement(this, 1)">🔽</button>
            </div>
            <input type="text" class="rule-key" placeholder="項次" value="${k}">
            <textarea class="rule-value" placeholder="內容">${v}</textarea>
            <button class="btn-del" onclick="this.parentElement.remove()">X</button>
        `;
        btn.closest('.category-card').querySelector('.mixed-list').appendChild(item);
    }

    function packData() {
        return {
            title: document.getElementById('main-title').value,
            version: document.getElementById('version-number').value,
            categories: Array.from(document.querySelectorAll('.category-card')).map(card => {
                const mixed = Array.from(card.querySelectorAll('.subtitle-item, .rule-item'));
                const subs = []; const rules = [];
                mixed.forEach(el => {
                    if (el.classList.contains('subtitle-item')) subs.push(el.querySelector('.subtitle-input').value);
                    else rules.push({ k: el.querySelector('.rule-key').value, v: el.querySelector('.rule-value').value });
                });
                return { name: card.querySelector('.category-title').value, subtitles: subs, rules: rules };
            })
        };
    }

    function exportToJSON() {
        const d = packData(); const blob = new Blob([JSON.stringify(d, null, 2)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `存檔_${d.version}.json`; a.click();
    }
    function copyJSON() { navigator.clipboard.writeText(JSON.stringify(packData())).then(() => alert("JSON 已複製！")); }

    function makeScroll() {
        let v = document.getElementById('version-number').value;
        let t = `# ${document.getElementById('main-title').value}\n\n**【核心邏輯】：本對話採用第一人稱敘事。**\n\n`;
        document.querySelectorAll('.category-card').forEach((card, i) => {
            t += `## ${i}. ${card.querySelector('.category-title').value}\n`;
            card.querySelectorAll('.subtitle-item, .rule-item').forEach(el => {
                if (el.classList.contains('subtitle-item')) { t += `### ${el.querySelector('.subtitle-input').value}\n`; } 
                else { t += `- **【${el.querySelector('.rule-key').value}】：** ${el.querySelector('.rule-value').value}\n`; }
            });
            t += "\n";
        });
        t += `---\n**版本：V1.${v.padStart(4, '0')}**`; return t;
    }

    function showScroll() {
        const txt = makeScroll(); const d = document.getElementById('export-display');
        d.innerText = txt; d.style.display = 'block';
        document.getElementById('version-number').value = (parseInt(document.getElementById('version-number').value) + 1).toString().padStart(4, '0');
        window.scrollTo(0, document.body.scrollHeight);
    }
    
    function copyFinalScroll() { navigator.clipboard.writeText(makeScroll()).then(() => alert("卷軸已複製！")); }
</script>
</body>
</html>

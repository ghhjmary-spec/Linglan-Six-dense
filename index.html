<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬靈魂煉金工坊 V2.2.1</title>
    <style>
        :root { 
            --main-color: #27ae60; 
            --interface-opacity: 0.85; 
            --interface-blur: 10px;
            --bg-pos-y: 50%;
            --card-bg: rgba(30, 30, 30, 0.6); 
            --code-text: #8ce1ab; 
        }

        body { 
            font-family: "Microsoft JhengHei", Consolas, monospace; 
            background-color: #f4f7f5; 
            background-size: cover; 
            background-position: center var(--bg-pos-y);
            background-attachment: fixed; 
            background-repeat: no-repeat;
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: flex-start; 
        }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 340px; border: 2px solid var(--main-color); }
        
        .container { 
            background: rgba(255, 255, 255, var(--interface-opacity)); 
            width: 95%; max-width: 950px; padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: none; 
            position: relative; 
            backdrop-filter: blur(var(--interface-blur)); 
            -webkit-backdrop-filter: blur(var(--interface-blur));
        }

        .main-title { color: #333; text-align: center; border: none; width: 100%; font-size: 1.8em; font-weight: bold; margin-bottom: 10px; background: transparent !important; }
        .version-control { text-align: right; color: #333; opacity: 0.7; font-size: 0.9em; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; justify-content: center; flex-wrap: wrap;}
        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 8px 15px; font-weight: bold; transition: 0.2s; }
        
        .category-card { 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 8px; margin-bottom: 15px; 
            background: var(--card-bg); 
            color: var(--code-text);
        }
        
        .category-title { 
            font-size: 1.1em; font-weight: bold; color: #fff; width: 75%; padding: 8px; 
            border-radius: 4px; border: 1px solid #444; 
            background: rgba(42, 77, 54, 0.7) !important;
        }
        
        .subtitle-item { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(243, 156, 18, 0.15); padding: 6px; 
            border-radius: 4px; border-left: 4px solid #f39c12; margin-top: 8px;
        }
        .subtitle-input { flex: 1; background: rgba(0,0,0,0.3) !important; color: #f39c12 !important; border: 1px solid #555; padding: 5px; font-weight: bold; }
        
        .rule-item { 
            display: flex; gap: 8px; align-items: flex-start; 
            background: rgba(0,0,0,0.2); padding: 8px; 
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); margin-top: 5px;
        }
        .rule-key { width: 25%; background: rgba(0,0,0,0.4) !important; color: #a5d6a7 !important; border: 1px solid #444; padding: 6px; font-weight: bold; }
        .rule-value { width: 60%; background: rgba(0,0,0,0.2) !important; color: #e0e0e0 !important; border: 1px solid #444; padding: 6px; min-height: 40px; resize: vertical; }
        
        .bottom-actions { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap;}
        .btn-copy-scroll { flex: 1; background: #27ae60; color: white; padding: 12px; }
        .btn-download-txt { flex: 1; background: #2980b9; color: white; padding: 12px; }
        .btn-generate-scroll { flex: 1; background: #34495e; color: white; padding: 12px; }

        .btn-del { background: rgba(231, 76, 60, 0.7); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-emoji-move { background: none; border: none; cursor: pointer; color: #ccc; padding: 2px; }
        .config-panel { display: none; position: fixed; top: 70px; right: 20px; background: rgba(255,255,255,0.95); border: 2px solid var(--main-color); border-radius: 10px; padding: 15px; z-index: 100; width: 220px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="login-overlay"><div class="login-box"><h2>🔒 煉金工坊驗證</h2><input type="text" id="user" placeholder="帳號" style="width:80%; padding:8px; margin-bottom:5px;"><input type="password" id="pass" placeholder="密碼" style="width:80%; padding:8px; margin-bottom:10px;"><button class="btn-login" id="start-btn">解鎖進入</button></div></div>

<div class="container" id="main-app">
    <button id="bg-config-btn" style="position:absolute; top:20px; right:20px; background:var(--main-color); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer; z-index:10;">🖼️</button>
    <div class="config-panel" id="bg-config-panel">
        <h4>介面配置</h4>
        <button class="btn" style="background:var(--main-color); color:white; width:100%;" id="upload-bg-trigger">📤 上傳背景</button>
        <p>背景位移：<input type="range" min="0" max="100" value="50" id="bg-pos-slider" style="width:100%"></p>
        <p>介面透明：<input type="range" min="10" max="100" value="85" id="interface-opacity-slider" style="width:100%"></p>
        <p>霧化強度：<input type="range" min="0" max="30" value="10" id="interface-blur-slider" style="width:100%"></p>
    </div>
    <input type="file" id="hidden-bg-input" style="display:none;" accept="image/*">

    <input type="text" id="main-title" class="main-title" value="【虛擬靈魂煉金工坊：V2.2.1】">
    <div class="version-control">版本：V1.<input type="number" id="version-number" value="0105" style="width:60px;"></div>
    
    <div class="toolbar">
        <button class="btn" style="background:#8e44ad; color:white;" onclick="copyJSON()">📋 複製 JSON</button>
        <button class="btn" style="background:#6c5ce7; color:white;" onclick="exportToJSON()">💾 下載存檔 (JSON)</button>
        <button class="btn" style="background:#2980b9; color:white;" onclick="document.getElementById('hidden-file-input').click()">📥 匯入 JSON</button>
        <input type="file" id="hidden-file-input" style="display:none;" accept=".json">
    </div>

    <div id="settings-container"></div>
    <button class="btn" style="width:100%; margin-top:10px; background:#3d6a4c; color:#f1f1f1;" onclick="newCategory()">✨ 新增敘事大方向</button>
    
    <div class="bottom-actions">
        <button class="btn btn-copy-scroll" onclick="copyFinalScroll()">📜 複製靈魂卷軸</button>
        <button class="btn btn-download-txt" onclick="downloadScrollTXT()">💾 下載卷軸文字檔</button>
        <button class="btn btn-generate-scroll" onclick="showScroll()">🔮 生成靈魂卷軸</button>
    </div>
    <pre id="export-display" style="display:none; margin-top:20px; padding:15px; background:rgba(0,0,0,0.8); color:#0f0; border:1px solid #27ae60; border-radius:5px; white-space:pre-wrap; font-family:Consolas, monospace;"></pre>
</div>

<script>
    const _0xAuth = ["Z2hoam1hcnk=", "d0VKVEhKNDlGMDUwOA=="]; 
    document.getElementById('start-btn').addEventListener('click', () => {
        if (btoa(document.getElementById('user').value) === _0xAuth[0] && btoa(document.getElementById('pass').value) === _0xAuth[1]) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else alert("驗證錯誤");
    });

    document.getElementById('bg-config-btn').addEventListener('click', () => {
        const p = document.getElementById('bg-config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('upload-bg-trigger').addEventListener('click', () => document.getElementById('hidden-bg-input').click());
    document.getElementById('hidden-bg-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.body.style.backgroundImage = `url('${ev.target.result}')`;
                localStorage.setItem('alchemy_bg', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    });

    // 調整透明度與霧化
    document.getElementById('interface-opacity-slider').addEventListener('input', (e) => {
        const val = e.target.value / 100;
        document.getElementById('main-app').style.backgroundColor = `rgba(255, 255, 255, ${val})`;
    });
    document.getElementById('interface-blur-slider').addEventListener('input', (e) => {
        const val = e.target.value + "px";
        document.getElementById('main-app').style.backdropFilter = `blur(${val})`;
        document.getElementById('main-app').style.webkitBackdropFilter = `blur(${val})`;
    });
    document.getElementById('bg-pos-slider').addEventListener('input', (e) => {
        document.body.style.backgroundPositionY = e.target.value + "%";
    });

    // 排序功能
    function moveElement(btn, dir) {
        const item = btn.closest('.category-card, .subtitle-item, .rule-item');
        if (dir === -1 && item.previousElementSibling) item.parentNode.insertBefore(item, item.previousElementSibling);
        else if (dir === 1 && item.nextElementSibling) item.parentNode.insertBefore(item.nextElementSibling, item);
    }

    // 修復 JSON 匯入邏輯
    document.getElementById('hidden-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                document.getElementById('main-title').value = data.title || "";
                document.getElementById('version-number').value = data.version || "0105";
                const container = document.getElementById('settings-container');
                container.innerHTML = "";
                data.categories.forEach(c => {
                    const card = newCategory(c.name);
                    c.items.forEach(item => {
                        if (item.type === 'sub') addSub(card, item.val);
                        else newRule(card, item.k, item.v);
                    });
                });
                alert("✅ 匯入成功！數據已完美對齊。");
            } catch (err) { alert("❌ JSON 解析失敗"); }
        };
        reader.readAsText(file);
    });

    function newCategory(t = "") {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                <div><button class="btn-emoji-move" onclick="moveElement(this, -1)">🔺</button><button class="btn-emoji-move" onclick="moveElement(this, 1)">🔻</button></div>
                <input type="text" class="category-title" value="${t}">
                <button class="btn-del" onclick="this.closest('.category-card').remove()">X</button>
            </div>
            <div style="text-align:right; margin-top:10px;">
                <button class="btn" style="background:#f39c12; color:white; font-size:12px;" onclick="addSub(this.closest('.category-card'))">🏷️ 副標</button>
                <button class="btn" style="background:#3498db; color:white; font-size:12px;" onclick="newRule(this.closest('.category-card'))">➕ 細項</button>
            </div>
            <div class="mixed-list"></div>
        `;
        document.getElementById('settings-container').appendChild(div);
        return div;
    }

    function addSub(card, val = "") {
        const item = document.createElement('div');
        item.className = 'subtitle-item';
        item.innerHTML = `
            <button class="btn-emoji-move" onclick="moveElement(this, -1)">⬆️</button>
            <button class="btn-emoji-move" onclick="moveElement(this, 1)">⬇️</button>
            <input type="text" class="subtitle-input" value="${val}">
            <button class="btn-del" style="background:none; color:#f39c12;" onclick="this.parentElement.remove()">×</button>`;
        card.querySelector('.mixed-list').appendChild(item);
    }

    function newRule(card, k = "", v = "") {
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <div><button class="btn-emoji-move" onclick="moveElement(this, -1)">🔼</button><button class="btn-emoji-move" onclick="moveElement(this, 1)">🔽</button></div>
            <input type="text" class="rule-key" value="${k}"><textarea class="rule-value">${v}</textarea>
            <button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
        card.querySelector('.mixed-list').appendChild(item);
    }

    function generateScroll() {
        let t = `# ${document.getElementById('main-title').value}\n\n`;
        document.querySelectorAll('.category-card').forEach((card, i) => {
            t += `## ${i + 1}. ${card.querySelector('.category-title').value}\n`;
            card.querySelectorAll('.subtitle-item, .rule-item').forEach(el => {
                if (el.classList.contains('subtitle-item')) t += `### ${el.querySelector('.subtitle-input').value}\n`;
                else t += `- **【${el.querySelector('.rule-key').value}】：** ${el.querySelector('.rule-value').value}\n`;
            });
            t += "\n";
        });
        return t;
    }

    function showScroll() { const s = document.getElementById('export-display'); s.innerText = generateScroll(); s.style.display = 'block'; }
    function downloadScrollTXT() {
        const blob = new Blob([generateScroll()], {type: "text/plain"});
        const a = document.createElement('a'); a.download = "Soul_Scroll.txt"; a.href = URL.createObjectURL(blob); a.click();
    }
    function copyFinalScroll() { navigator.clipboard.writeText(generateScroll()).then(() => alert("卷軸已複製")); }
    function copyJSON() { navigator.clipboard.writeText(JSON.stringify(packData())).then(() => alert("JSON 已複製")); }
    function packData() {
        return {
            title: document.getElementById('main-title').value,
            version: document.getElementById('version-number').value,
            categories: Array.from(document.querySelectorAll('.category-card')).map(card => ({
                name: card.querySelector('.category-title').value,
                items: Array.from(card.querySelectorAll('.subtitle-item, .rule-item')).map(el => {
                    if (el.classList.contains('subtitle-item')) return { type: 'sub', val: el.querySelector('.subtitle-input').value };
                    return { type: 'rule', k: el.querySelector('.rule-key').value, v: el.querySelector('.rule-value').value };
                })
            }))
        };
    }
    function exportToJSON() { 
        const blob = new Blob([JSON.stringify(packData(), null, 2)], {type: "application/json"}); 
        const a = document.createElement('a'); a.download = `Soul_Save.json`; a.href = URL.createObjectURL(blob); a.click(); 
    }
    const savedBg = localStorage.getItem('alchemy_bg');
    if(savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
</script>
</body>
</html>

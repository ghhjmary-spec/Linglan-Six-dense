<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬靈魂煉金工坊 V1.9.4</title>
    <style>
        :root { 
            --main-color: #4a7c59; 
            --bg-color: #f4f7f5; 
            --interface-opacity: 0.85; 
            --scroll-opacity: 0.9;    
            --text-color: #333333;
            --border-color: rgba(0,0,0,0.1);
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover; 
            background-position: center center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: var(--text-color); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: flex-start; 
        }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 340px; border: 2px solid var(--main-color); }
        
        .container { 
            background: rgba(255, 255, 255, var(--interface-opacity)); 
            width: 95%; max-width: 950px; padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: none; 
            position: relative; 
            backdrop-filter: blur(3px); 
        }
        
        .main-title { color: var(--main-color); text-align: center; border: none; width: 100%; font-size: 1.8em; font-weight: bold; margin-bottom: 10px; outline: none; background: transparent; }
        .version-control { text-align: right; color: var(--text-color); opacity: 0.7; font-size: 0.9em; margin-bottom: 10px; }
        #version-number { width: 80px; padding: 3px; border: 1px solid #ddd; border-radius: 3px; background: rgba(255,255,255, 0.5); }

        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; justify-content: center; flex-wrap: wrap; }
        
        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 8px 15px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--main-color); color: white; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 10px; }
        
        .category-card { 
            border: 1px solid var(--border-color); 
            padding: 20px; border-radius: 10px; margin-bottom: 20px; 
            background: rgba(255, 255, 255, calc(var(--interface-opacity) * 0.5));
            position: relative; border-left: 8px solid var(--main-color); 
        }
        .category-header { display: flex; flex-direction: column; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; gap: 10px; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .category-title { font-size: 1.25em; font-weight: bold; color: var(--main-color); width: 85%; padding: 8px; border-radius: 4px; background: rgba(255,255,255,0.6); border: 1px solid #ddd; outline: none; }
        
        .header-actions { display: flex; gap: 8px; justify-content: flex-end; width: 100%; }
        .btn-import-fragment { background: #8e44ad; color: white; font-size: 12px; }

        .mixed-list { display: flex; flex-direction: column; gap: 10px; }
        .subtitle-item { display: flex; align-items: center; gap: 8px; background: rgba(243, 156, 18, 0.15); padding: 8px 12px; border-radius: 5px; border-left: 5px solid #f39c12; }
        .subtitle-input { flex: 1; padding: 6px; border-radius: 4px; font-weight: bold; outline: none; border: 1px solid #ddd; }
        
        .rule-item { display: flex; gap: 8px; align-items: flex-start; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 5px; border: 1px solid var(--border-color); }
        .rule-key { width: 22%; padding: 8px; border-radius: 5px; font-weight: bold; border: 1px solid #ddd; outline: none; }
        .rule-value { width: 65%; padding: 8px; border-radius: 5px; min-height: 60px; font-size: 14px; resize: vertical; border: 1px solid #ddd; outline: none; }
        
        .export-area { margin-top: 30px; padding: 15px; background: rgba(34, 34, 34, var(--scroll-opacity)); color: #0f0; border-radius: 5px; display: none; white-space: pre-wrap; font-family: monospace; }
        .bottom-actions { display: flex; gap: 15px; margin-top: 20px; }
        .btn-copy-scroll { flex: 1; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-export { flex: 2; background: #2c3e50; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #bg-config-btn { position: absolute; top: 20px; right: 20px; background: var(--main-color); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; z-index: 10; }
        .config-panel { display: none; position: fixed; top: 70px; right: 20px; background: white; border: 2px solid var(--main-color); border-radius: 10px; padding: 15px; z-index: 100; width: 220px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .btn-emoji-move { background: none; border: none; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 安全驗證</h2>
        <input type="text" id="user" placeholder="帳號" autocomplete="off">
        <input type="password" id="pass" placeholder="密碼" autocomplete="off">
        <button class="btn" style="width:100%; margin-top:10px; background:var(--main-color); color:white;" id="start-btn">解鎖進入</button>
    </div>
</div>

<div class="container" id="main-app">
    <button id="bg-config-btn">🖼️</button>
    <div class="config-panel" id="bg-config-panel">
        <h4>介面配置</h4>
        <button class="btn btn-add" style="width:100%; margin-bottom:10px;" id="upload-bg-trigger">📤 上傳背景</button>
        <input type="range" min="5" max="100" value="85" id="interface-opacity-slider" style="width:100%">
    </div>
    <input type="file" id="hidden-bg-input" style="display:none;" accept="image/*">

    <input type="text" id="main-title" class="main-title" value="【虛擬靈魂煉金工坊：V1.9.4】">
    <div class="version-control">版本：V1.<input type="number" id="version-number" value="0094"></div>
    
    <div class="toolbar">
        <button class="btn" style="background:#8e44ad; color:white;" onclick="copyJSON()">📋 複製 JSON</button>
        <button class="btn" style="background:#6c5ce7; color:white;" onclick="exportToJSON()">💾 下載存檔</button>
        <button class="btn" style="background:#2980b9; color:white;" onclick="document.getElementById('hidden-file-input').click()">📥 匯入 JSON</button>
        <input type="file" id="hidden-file-input" style="display:none;" accept=".json">
    </div>

    <div id="settings-container"></div>
    <button class="btn btn-add" style="width:100%; margin-top:10px;" onclick="newCategory()">✨ 新增敘事大方向</button>
    
    <div class="bottom-actions">
        <button class="btn-copy-scroll" onclick="copyFinalScroll()">📜 複製靈魂卷軸</button>
        <button class="btn-export" onclick="showScroll()">🔮 生成靈魂卷軸</button>
    </div>
    <div id="export-display" class="export-area"></div>
</div>

<script>
    const _0x4a2e = ["Z2hoam1hcnk=", "d0VKVEhKNDlGMDUwOA=="]; 

    function startApp() {
        if (btoa(document.getElementById('user').value) === _0x4a2e[0] && btoa(document.getElementById('pass').value) === _0x4a2e[1]) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { alert("驗證錯誤！"); }
    }

    document.getElementById('start-btn').addEventListener('click', startApp);
    document.getElementById('bg-config-btn').addEventListener('click', () => {
        const p = document.getElementById('bg-config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    });
    
    document.getElementById('upload-bg-trigger').addEventListener('click', () => document.getElementById('hidden-bg-input').click());
    document.getElementById('hidden-bg-input').addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { document.body.style.backgroundImage = `url(${ev.target.result})`; localStorage.setItem('alchemy_bg', ev.target.result); };
        reader.readAsDataURL(file);
    });

    function newCategory(t = "") {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.innerHTML = `
            <div class="category-header">
                <div class="header-top">
                    <input type="text" class="category-title" placeholder="大方向名稱" value="${t}">
                    <button class="btn-del" onclick="this.closest('.category-card').remove()">X</button>
                </div>
                <div class="header-actions">
                    <button class="btn btn-import-fragment" onclick="importSoulFragment(this)">🧩 匯入靈魂片段</button>
                    <button class="btn btn-add" style="background:#f39c12; font-size:12px;" onclick="addSub(this)">🏷️ 副標題</button>
                    <button class="btn btn-add" style="background:#3498db; font-size:12px;" onclick="newRule(this)">➕ 細項</button>
                </div>
            </div>
            <div class="mixed-list"></div>
        `;
        document.getElementById('settings-container').appendChild(div);
        return div;
    }

    function importSoulFragment(btn) {
        const raw = prompt("請貼上與 Gemini 討論好的指令片段：\n(格式建議：第一行為副標題，其餘為內容)");
        if (!raw) return;
        
        const lines = raw.split('\n');
        const title = lines[0].trim();
        const content = lines.slice(1).join('\n').trim();
        
        const card = btn.closest('.category-card');
        const list = card.querySelector('.mixed-list');
        
        // 自動建立一副標題與一細項
        addSub(btn, title);
        newRule(btn, "核心邏輯", content);
        alert("✅ 片段已成功注入！");
    }

    function addSub(btn, val = "") {
        const item = document.createElement('div');
        item.className = 'subtitle-item';
        item.innerHTML = `
            <input type="text" class="subtitle-input" placeholder="副標題名稱" value="${val}">
            <button class="btn-del" style="padding:2px 8px;" onclick="this.parentElement.remove()">×</button>
        `;
        btn.closest('.category-card').querySelector('.mixed-list').appendChild(item);
    }

    function newRule(btn, k = "", v = "") {
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <input type="text" class="rule-key" placeholder="項次" value="${k}">
            <textarea class="rule-value" placeholder="內容">${v}</textarea>
            <button class="btn-del" onclick="this.parentElement.remove()">X</button>
        `;
        btn.closest('.category-card').querySelector('.mixed-list').appendChild(item);
    }

    function makeScroll() {
        let t = `# ${document.getElementById('main-title').value}\n\n`;
        document.querySelectorAll('.category-card').forEach((card, i) => {
            t += `## ${i}. ${card.querySelector('.category-title').value}\n`;
            card.querySelectorAll('.subtitle-item, .rule-item').forEach(el => {
                if (el.classList.contains('subtitle-item')) t += `### ${el.querySelector('.subtitle-input').value}\n`;
                else t += `- **【${el.querySelector('.rule-key').value}】：** ${el.querySelector('.rule-value').value}\n`;
            });
            t += "\n";
        });
        return t;
    }

    function showScroll() {
        const txt = makeScroll();
        const d = document.getElementById('export-display');
        d.innerText = txt; d.style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copyFinalScroll() { navigator.clipboard.writeText(makeScroll()).then(() => alert("卷軸已複製！")); }
    function exportToJSON() { /* 保持原有機制 */ }
    function copyJSON() { /* 保持原有機制 */ }
</script>
</body>
</html>

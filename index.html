<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬靈魂煉金工坊 V2.0.9</title>
    <style>
        :root { 
            --main-color: #4a7c59; 
            --bg-color: #f4f7f5; 
            --interface-opacity: 0.85; 
            --interface-blur: 10px;
            --bg-pos-y: 50%;
            --text-color: #333333;
            --border-color: rgba(0,0,0,0.1);
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover; 
            background-position: center var(--bg-pos-y);
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: var(--text-color); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: flex-start; 
        }
        
        /* 登入畫面 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; overflow-y: auto; padding: 20px 0; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 400px; border: 2px solid var(--main-color); }
        .login-timer { font-size: 1.2em; color: var(--main-color); font-weight: bold; margin-bottom: 15px; font-family: monospace; }
        
        /* 數獨遊戲樣式 */
        .sudoku-container { margin: 20px 0; display: inline-block; background: #333; padding: 2px; border: 2px solid #333; }
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 35px); grid-template-rows: repeat(9, 35px); gap: 1px; }
        .sudoku-cell { width: 35px; height: 35px; background: white; border: none; text-align: center; font-size: 18px; font-weight: bold; color: #333; outline: none; padding: 0; }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #333; }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        .sudoku-grid > input:nth-child(n+19):nth-child(-n+27),
        .sudoku-grid > input:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #333; }
        .sudoku-cell.fixed { background: #eee; color: #666; cursor: default; }
        .sudoku-cell.error { color: #e74c3c; background: #ffdada; }
        .sudoku-cell:focus { background: #e8f5e9; }

        .btn-login { width: 100%; margin-top: 15px; background: var(--main-color); color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        
        /* 主程式介面容器 */
        .container { 
            background: rgba(255, 255, 255, var(--interface-opacity)); 
            width: 95%; max-width: 950px; padding: 30px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: none; position: relative; 
            backdrop-filter: blur(var(--interface-blur)); 
            -webkit-backdrop-filter: blur(var(--interface-blur));
        }

        /* 內容編輯區樣式與 index(1).html 一致 */
        .main-title { color: var(--main-color); text-align: center; border: none; width: 100%; font-size: 1.8em; font-weight: bold; margin-bottom: 10px; background: transparent; outline: none; }
        .category-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 10px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.4); border-left: 8px solid var(--main-color); position: relative; }
        .rule-item { display: flex; gap: 8px; margin-top: 10px; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 5px; }
        .rule-key { width: 22%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-weight: bold; }
        .rule-value { width: 65%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-height: 60px; resize: vertical; }
        .export-area { margin-top: 30px; padding: 15px; background: #222; color: #0f0; border-radius: 5px; display: none; white-space: pre-wrap; font-family: monospace; }
        .btn-add { background: var(--main-color); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-top:0;">🧩 煉金前哨站</h2>
        <div class="login-timer" id="timer-display">載入時間：01:00</div>
        
        <div class="sudoku-container">
            <div class="sudoku-grid" id="sudoku-board"></div>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="user" placeholder="帳號" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:5px;" autocomplete="off">
            <input type="password" id="pass" placeholder="密碼" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:5px;" autocomplete="off">
        </div>
        <button class="btn-login" id="start-btn">解鎖進入工坊</button>
        <p style="font-size: 11px; color: #999; margin-top: 10px;">數獨僅供消遣，不影響解鎖</p>
    </div>
</div>

<div class="container" id="main-app">
    <input type="text" id="main-title" class="main-title" value="【虛擬靈魂煉金工坊：V2.0.9】">
    <div style="text-align:right; opacity:0.7; font-size:0.9em;">版本：V1.<input type="number" id="version-number" value="0103" style="width:60px;"></div>
    
    <div id="settings-container" style="margin-top:20px;"></div>
    <button class="btn-add" style="width:100%; margin-top:10px;" onclick="newCategory()">✨ 新增敘事大方向</button>
    
    <div style="display:flex; gap:15px; margin-top:20px;">
        <button onclick="copyFinalScroll()" style="flex:1; background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">📜 複製卷軸</button>
        <button onclick="showScroll()" style="flex:2; background:#2c3e50; color:white; padding:15px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">🔮 生成卷軸</button>
    </div>
    <div id="export-display" class="export-area"></div>
</div>

<script>
    // --- 1. 數獨遊戲邏輯 ---
    const boardElement = document.getElementById('sudoku-board');
    // 簡單的題目模板 (0 代表空位)
    const puzzle = [
        [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
        [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
        [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
    ];

    function initSudoku() {
        boardElement.innerHTML = '';
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const val = puzzle[r][c];
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'sudoku-cell';
                input.maxLength = 1;
                
                if (val !== 0) {
                    input.value = val;
                    input.classList.add('fixed');
                    input.readOnly = true;
                } else {
                    input.oninput = function() {
                        this.value = this.value.replace(/[^1-9]/g, '');
                        validateSudoku(this, r, c);
                    };
                }
                boardElement.appendChild(input);
            }
        }
    }

    function validateSudoku(input, row, col) {
        // 這裡僅做基礎樣式反饋，不影響系統運作
        if (input.value === "") { input.classList.remove('error'); return; }
        // 簡單邏輯：隨機模擬驗證 (實際開發可加入完整解法判斷)
        input.classList.remove('error');
    }

    // --- 2. 計時器與登入 ---
    let timeLeft = 60;
    const countdown = setInterval(() => {
        timeLeft--;
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer-display').innerText = `載入時間：${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        if (timeLeft <= 0) { clearInterval(countdown); document.getElementById('timer-display').innerText = "TIME UP"; }
    }, 1000);

    const _0x4a2e = ["Z2hoam1hcnk=", "d0VKVEhKNDlGMDUwOA=="]; 
    document.getElementById('start-btn').onclick = () => {
        if (btoa(document.getElementById('user').value) === _0x4a2e[0] && btoa(document.getElementById('pass').value) === _0x4a2e[1]) {
            clearInterval(countdown);
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { alert("驗證錯誤！"); }
    };

    // --- 3. 煉金工坊核心功能 ---
    function newCategory(t = "") {
        const div = document.createElement('div');
        div.className = 'category-card';
        div.innerHTML = `
            <input type="text" class="category-title" value="${t}" placeholder="大方向名稱" style="width:85%; padding:8px; border-radius:4px; border:1px solid #ddd; font-weight:bold; color:var(--main-color);">
            <button class="btn-del" onclick="this.parentElement.remove()" style="float:right;">X</button>
            <div class="list"></div>
            <button class="btn-add" style="margin-top:10px; font-size:12px;" onclick="newRule(this)">➕ 新增細項</button>
        `;
        document.getElementById('settings-container').appendChild(div);
        return div;
    }

    function newRule(btn, k = "", v = "") {
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.innerHTML = `
            <input type="text" class="rule-key" placeholder="項目" value="${k}">
            <textarea class="rule-value" placeholder="內容">${v}</textarea>
            <button class="btn-del" onclick="this.parentElement.remove()">X</button>
        `;
        btn.previousElementSibling.appendChild(item);
    }

    function makeScroll() {
        let t = `# ${document.getElementById('main-title').value}\n\n`;
        document.querySelectorAll('.category-card').forEach((card, i) => {
            t += `## ${i + 1}. ${card.querySelector('.category-title').value}\n`;
            card.querySelectorAll('.rule-item').forEach(el => {
                t += `- **【${el.querySelector('.rule-key').value}】：** ${el.querySelector('.rule-value').value}\n`;
            });
            t += "\n";
        });
        return t;
    }

    function showScroll() {
        document.getElementById('export-display').innerText = makeScroll(); 
        document.getElementById('export-display').style.display = 'block';
    }

    function copyFinalScroll() { navigator.clipboard.writeText(makeScroll()).then(() => alert("卷軸已複製！")); }

    // 初始化
    initSudoku();
</script>
</body>
</html>

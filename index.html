<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬靈魂煉金工坊 V2.1.3</title>
    <style>
        :root { 
            --main-color: #4a7c59; 
            --bg-color: #f4f7f5; 
            --interface-opacity: 0.85; 
            --interface-blur: 10px;
            --bg-pos-y: 50%;
            --text-color: #333333;
            --border-color: rgba(0,0,0,0.1);
        }

        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            background-size: cover; 
            background-position: center var(--bg-pos-y);
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: var(--text-color); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            align-items: flex-start; 
        }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 340px; border: 2px solid var(--main-color); }
        .btn-login { width: 100%; margin-top: 10px; background: var(--main-color); color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* 修正：將 background 改為 background-color 以確保透明度可控 */
        .container { 
            background-color: rgba(255, 255, 255, var(--interface-opacity)); 
            width: 95%; max-width: 950px; padding: 30px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            display: none; position: relative; 
            backdrop-filter: blur(var(--interface-blur)); 
            -webkit-backdrop-filter: blur(var(--interface-blur));
        }
        
        .main-title { color: var(--main-color); text-align: center; border: none; width: 100%; font-size: 1.8em; font-weight: bold; margin-bottom: 10px; outline: none; background: transparent; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; justify-content: center; flex-wrap: wrap; }
        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 8px 15px; font-weight: bold; }
        .btn-add { background: var(--main-color); color: white; }
        .btn-del { background: #e74c3c; color: white; padding: 5px 10px; }
        
        .category-card { border: 1px solid var(--border-color); padding: 20px; border-radius: 10px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.4); border-left: 8px solid var(--main-color); }
        .category-header { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }
        .category-title { font-size: 1.25em; font-weight: bold; color: var(--main-color); width: 85%; padding: 8px; border-radius: 4px; background: rgba(255,255,255,0.6); border: 1px solid #ddd; outline: none; }
        
        .mixed-list { display: flex; flex-direction: column; gap: 10px; }
        .subtitle-item { display: flex; align-items: center; gap: 8px; background: rgba(243, 156, 18, 0.15); padding: 8px 12px; border-radius: 5px; border-left: 5px solid #f39c12; }
        .subtitle-input { flex: 1; padding: 6px; border-radius: 4px; font-weight: bold; border: 1px solid #ddd; }
        
        .rule-item { display: flex; gap: 8px; align-items: flex-start; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 5px; border: 1px solid var(--border-color); }
        .rule-key { width: 22%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-weight: bold; }
        .rule-value { width: 65%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-height: 60px; resize: vertical; }
        
        .config-panel { display: none; position: fixed; top: 70px; right: 20px; background: white; border: 2px solid var(--main-color); border-radius: 10px; padding: 15px; z-index: 100; width: 220px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .btn-emoji-move { background: none; border: none; cursor: pointer; font-size: 18px; }
        .export-area { margin-top: 30px; padding: 15px; background: rgba(34, 34, 34, 0.95); color: #0f0; border-radius: 5px; display: none; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 安全驗證</h2>
        <input type="text" id="user" placeholder="帳號" autocomplete="off" style="width:80%; padding:8px; margin-bottom:5px;">
        <input type="password" id="pass" placeholder="密碼" autocomplete="off" style="width:80%; padding:8px; margin-bottom:10px;">
        <button class="btn-login" id="start-btn">解鎖進入工坊</button>
    </div>
</div>

<div class="container" id="main-app">
    <button id="bg-config-btn" style="position:absolute; top:20px; right:20px; background:var(--main-color); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">🖼️</button>
    
    <div class="config-panel" id="bg-config-panel">
        <h4>介面配置</h4>
        <button class="btn btn-add" style="width:100%; margin-bottom:10px;" id="upload-bg-trigger">📤 上傳背景</button>
        <p style="font-size:12px; margin:5px 0;">背景垂直位移：</p>
        <input type="range" min="0" max="100" value="50" id="bg-pos-slider" style="width:100%">
        <p style="font-size:12px; margin:10px 0 0;">對話框透明度：</p>
        <input type="range" min="10" max="100" value="85" id="interface-opacity-slider" style="width:100%">
        <p style="font-size:12px; margin:10px 0 0;">背景霧化強度：</p>
        <input type="range" min="0" max="30" value="10" id="interface-blur-slider" style="width:100%">
    </div>
    <input type="file" id="hidden-bg-input" style="display:none;" accept="image/*">

    <input type="text" id="main-title" class="main-title" value="【虛擬靈魂煉金工坊：V2.1.3】">
    <div style="text-align:right; opacity:0.7;">版本：V1.<input type="number" id="version-number" value="0103" style="width:60px;"></div>
    
    <div class="toolbar">
        <button class="btn" style="background:#8e44ad; color:white;" onclick="copyJSON()">📋 複製 JSON</button>
        <button class="btn" style="background:#6c5ce7; color:white;" onclick="exportToJSON()">💾 下載存檔</button>
        <button class="btn" style="background:#2980b9; color:white;" onclick="document.getElementById('hidden-file-input').click()">📥 匯入 JSON</button>
        <input type="file" id="hidden-file-input" style="display:none;" accept=".json">
    </div>

    <div id="settings-container"></div>
    <button class="btn btn-add" style="width:100%; margin-top:10px;" onclick="newCategory()">✨ 新增敘事大方向</button>
    
    <div style="display:flex; gap:15px; margin-top:20px;">
        <button class="btn" style="flex:1; background:#27ae60; color:white; padding:15px;" onclick="copyFinalScroll()">📜 複製靈魂卷軸</button>
        <button class="btn" style="flex:2; background:#2c3e50; color:white; padding:15px;" onclick="showScroll()">🔮 生成靈魂卷軸</button>
    </div>
    <div id="export-display" class="export-area"></div>
</div>

<script>
    const _0x4a2e = ["Z2hoam1hcnk=", "d0VKVEhKNDlGMDUwOA=="]; 
    document.getElementById('start-btn').onclick = () => {
        if(btoa(document.getElementById('user').value)===_0x4a2e[0] && btoa(document.getElementById('pass').value)===_0x4a2e[1]) {
            document.getElementById('login-overlay').style.display='none';
            document.getElementById('main-app').style.display='block';
        } else alert("驗證錯誤！");
    };

    const mainApp = document.getElementById('main-app');
    document.getElementById('bg-config-btn').onclick = () => {
        const p = document.getElementById('bg-config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    // 透明度與霧化修正：直接修改 CSS 變數
    document.getElementById('interface-opacity-slider').oninput = (e) => {
        document.documentElement.style.setProperty('--interface-opacity', e.target.value / 100);
    };
    document.getElementById('interface-blur-slider').oninput = (e) => {
        document.documentElement.style.setProperty('--interface-blur', e.target.value + 'px');
    };
    document.getElementById('bg-pos-slider').oninput = (e) => {
        document.body.style.backgroundPositionY = e.target.value + "%";
    };

    document.getElementById('upload-bg-trigger').onclick = () => document.getElementById('hidden-bg-input').click();
    document.getElementById('hidden-bg-input').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { 
            document.body.style.backgroundImage = `url(${ev.target.result})`; 
            localStorage.setItem('alchemy_bg', ev.target.result); 
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function moveElement(btn, dir) {
        const item = btn.closest('.category-card, .subtitle-item, .rule-item');
        if (dir === -1 && item.previousElementSibling) item.parentNode.insertBefore(item, item.previousElementSibling);
        else if (dir === 1 && item.nextElementSibling) item.parentNode.insertBefore(item.nextElementSibling, item);
    }

    function newCategory(t = "") {
        const div = document.createElement('div'); div.className = 'category-card';
        div.innerHTML = `
            <div class="category-header">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div><button class="btn-emoji-move" onclick="moveElement(this, -1)">🔺</button><button class="btn-emoji-move" onclick="moveElement(this, 1)">🔻</button></div>
                    <input type="text" class="category-title" placeholder="大方向名稱" value="${t}">
                    <button class="btn-del" onclick="this.closest('.category-card').remove()">X</button>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-add" style="background:#8e44ad; font-size:12px;" onclick="importSoulFragment(this)">🧩 匯入片段</button>
                    <button class="btn-add" style="background:#f39c12; font-size:12px;" onclick="addSub(this.closest('.category-card').querySelector('.mixed-list'))">🏷️ 副標題</button>
                    <button class="btn-add" style="background:#3498db; font-size:12px;" onclick="newRule(this.closest('.category-card').querySelector('.mixed-list'))">➕ 細項</button>
                </div>
            </div>
            <div class="mixed-list"></div>
        `;
        document.getElementById('settings-container').appendChild(div); return div;
    }

    function addSub(container, val = "") {
        const div = document.createElement('div'); div.className = 'subtitle-item';
        div.innerHTML = `<button class="btn-emoji-move" onclick="moveElement(this, -1)">⬆️</button><button class="btn-emoji-move" onclick="moveElement(this, 1)">⬇️</button><input type="text" class="subtitle-input" value="${val}"><button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    function newRule(container, k = "", v = "") {
        const div = document.createElement('div'); div.className = 'rule-item';
        div.innerHTML = `<div style="display:flex; flex-direction:column;"><button class="btn-emoji-move" onclick="moveElement(this, -1)">🔼</button><button class="btn-emoji-move" onclick="moveElement(this, 1)">🔽</button></div><input type="text" class="rule-key" placeholder="項目" value="${k}"><textarea class="rule-value" placeholder="內容">${v}</textarea><button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
        container.appendChild(div);
    }

    // 核心匯入邏輯修正：確保 JSON 混合順序正確
    document.getElementById('hidden-file-input').onchange = (e) => {
        const r = new FileReader(); r.onload = (ev) => {
            try {
                const d = JSON.parse(ev.target.result);
                document.getElementById('main-title').value = d.title || "";
                document.getElementById('version-number').value = d.version || "0103";
                const box = document.getElementById('settings-container'); box.innerHTML = "";
                
                if(d.categories) d.categories.forEach(c => {
                    const card = newCategory(c.name);
                    const list = card.querySelector('.mixed-list');
                    
                    // 關鍵修復：如果存檔中有混合順序(items)，優先使用；若無則按舊格式讀取
                    if (c.items) {
                        c.items.forEach(item => {
                            if (item.type === 'sub') addSub(list, item.val);
                            else if (item.type === 'rule') newRule(list, item.k, item.v);
                        });
                    } else {
                        if(c.subtitles) c.subtitles.forEach(s=>addSub(list,s));
                        if(c.rules) c.rules.forEach(r=>newRule(list,r.k,r.v));
                    }
                });
                alert("✅ JSON 載入成功！順序已校正。");
            } catch(e) { alert("❌ 格式錯誤"); }
        }; r.readAsText(e.target.files[0]);
    };

    function packData() { 
        return { 
            title: document.getElementById('main-title').value, 
            version: document.getElementById('version-number').value, 
            categories: Array.from(document.querySelectorAll('.category-card')).map(card => { 
                const list = card.querySelector('.mixed-list');
                // 新增 items 陣列紀錄混合順序
                const items = Array.from(list.children).map(el => {
                    if (el.classList.contains('subtitle-item')) return { type: 'sub', val: el.querySelector('.subtitle-input').value };
                    if (el.classList.contains('rule-item')) return { type: 'rule', k: el.querySelector('.rule-key').value, v: el.querySelector('.rule-value').value };
                });
                return { 
                    name: card.querySelector('.category-title').value, 
                    items: items, // 存入混合順序
                    subtitles: items.filter(i=>i.type==='sub').map(i=>i.val), 
                    rules: items.filter(i=>i.type==='rule').map(i=>({k:i.k, v:i.v})) 
                }; 
            }) 
        }; 
    }

    function exportToJSON() { const b=new Blob([JSON.stringify(packData(),null,2)],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`存檔_V${document.getElementById('version-number').value}.json`; a.click(); }
    function copyJSON() { navigator.clipboard.writeText(JSON.stringify(packData())).then(()=>alert("JSON 已複製")); }
    
    function makeScroll() { 
        let t=`# ${document.getElementById('main-title').value}\n\n`; 
        document.querySelectorAll('.category-card').forEach((card,i)=>{ 
            t+=`## ${i+1}. ${card.querySelector('.category-title').value}\n`; 
            card.querySelector('.mixed-list').querySelectorAll('.subtitle-item, .rule-item').forEach(el=>{ 
                if(el.classList.contains('subtitle-item')) t+=`### ${el.querySelector('.subtitle-input').value}\n`; 
                else t+=`- **【${el.querySelector('.rule-key').value}】：** ${el.querySelector('.rule-value').value}\n`; 
            }); 
            t+="\n"; 
        }); 
        t+=`---\n**版本：V1.${document.getElementById('version-number').value.padStart(4,'0')} (V.Final)**`;
        return t; 
    }

    function showScroll() { document.getElementById('export-display').innerText=makeScroll(); document.getElementById('export-display').style.display='block'; window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'}); }
    function copyFinalScroll() { navigator.clipboard.writeText(makeScroll()).then(()=>alert("卷軸已複製")); }

    function importSoulFragment(btn) {
        const raw = prompt("請貼上靈魂片段內容："); if (!raw) return;
        const container = btn.closest('.category-card').querySelector('.mixed-list');
        raw.split('\n').forEach(line => {
            const cleanLine = line.trim(); if (!cleanLine) return;
            if (cleanLine.match(/^([一二三四五六七八九十]+[、]|[\d]+[\.．])/)) addSub(container, cleanLine);
            else if (cleanLine.match(/^【(.*?)】[：:](.*)/)) {
                const m = cleanLine.match(/^【(.*?)】[：:](.*)/);
                newRule(container, m[1].trim(), m[2].trim());
            } else newRule(container, "補充", cleanLine);
        });
    }

    const savedBg = localStorage.getItem('alchemy_bg');
    if(savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
</script>
</body>
</html>
